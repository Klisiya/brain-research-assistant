<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Frontiers in Brain Science and Brain-Inspired Intelligence</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-page">

    <div class="shader-background" aria-hidden="true">
        <canvas id="loginShader"></canvas>
    </div>

    <a class="login-home-link" href="{{ url_for('home') }}">Back Home</a>

    <main class="login-shell">
        <section class="login-panel register-panel">
            <span class="login-label">Brain Research Tutor</span>

            <h1>Create Account</h1>
            <p>
                Join the AI tutor workspace and keep your brain science learning session secure.
            </p>

            <form class="login-form" method="POST">
                <label class="login-field">
                    <span>Username</span>
                    <input type="text" name="username" placeholder="Choose a username" autocomplete="username" value="{{ username or '' }}" required>
                </label>

                <label class="login-field">
                    <span>Email</span>
                    <input type="email" name="email" placeholder="name@example.com" autocomplete="email" value="{{ email or '' }}" required>
                </label>

                <label class="login-field">
                    <span>Password</span>
                    <input type="password" name="password" placeholder="Create a password" autocomplete="new-password" required>
                </label>

                <label class="login-field">
                    <span>Confirm Password</span>
                    <input type="password" name="confirm_password" placeholder="Repeat your password" autocomplete="new-password" required>
                </label>

                <button class="login-submit" type="submit">Create Account</button>

                {% if status_message %}
                <p class="login-status {{ status_type }}">{{ status_message }}</p>
                {% endif %}
            </form>

            <p class="auth-switch">
                Already have an account?
                <a href="{{ url_for('login') }}">Sign in</a>
            </p>
        </section>
    </main>

    {% include 'auth_shader.html' %}
</body>
</html>
